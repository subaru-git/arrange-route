name: db-production-migration

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "apply" to run production migration'
        required: true
        default: 'no'

jobs:
  apply-migrations:
    if: ${{ github.event.inputs.confirm == 'apply' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1

      - name: Link production project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_PRODUCTION_DB_PASSWORD }}
        run: |
          set -o pipefail
          supabase link \
            --project-ref "${{ secrets.SUPABASE_PRODUCTION_PROJECT_REF }}" \
            --password "$SUPABASE_DB_PASSWORD" 2>&1 | tee supabase-link.log
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            message=$(tr '\n' ' ' < supabase-link.log)
            echo "::error title=Supabase link failed::$message"
            exit "$status"
          fi

      - name: Repair manually initialized migration history
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_PRODUCTION_DB_PASSWORD }}
        run: |
          set -o pipefail
          supabase migration list 2>&1 | tee supabase-migrations-before.log
          if grep -q '20260215000001.*│.*20260215000001' supabase-migrations-before.log; then
            echo "Initial migration is already recorded remotely."
          else
            supabase migration repair 20260215000001 --status applied 2>&1 | tee supabase-repair.log
            status=${PIPESTATUS[0]}
            if [ "$status" -ne 0 ]; then
              message=$(tr '\n' ' ' < supabase-repair.log)
              echo "::error title=Supabase migration repair failed::$message"
              exit "$status"
            fi
          fi
          supabase migration list

      - name: Push migrations to production
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_PRODUCTION_DB_PASSWORD }}
        run: |
          set -o pipefail
          supabase db push 2>&1 | tee supabase-db-push.log
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            message=$(tr '\n' ' ' < supabase-db-push.log)
            echo "::error title=Supabase db push failed::$message"
            exit "$status"
          fi
