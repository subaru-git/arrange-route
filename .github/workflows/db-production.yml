name: db-production-migration

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "apply" to run production migration'
        required: true
        default: 'no'

jobs:
  apply-migrations:
    if: ${{ github.event.inputs.confirm == 'apply' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1

      - name: Link production project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_PRODUCTION_DB_PASSWORD }}
        run: |
          supabase link \
            --project-ref "${{ secrets.SUPABASE_PRODUCTION_PROJECT_REF }}" \
            --password "$SUPABASE_DB_PASSWORD"

      - name: Push migrations to production
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase db push
