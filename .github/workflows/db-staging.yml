name: db-staging-migration

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/migrations/**'
      - '.github/workflows/db-staging.yml'
  workflow_dispatch:

jobs:
  apply-migrations:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1

      - name: Link staging project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_STAGING_DB_PASSWORD }}
        run: |
          set -o pipefail
          supabase link \
            --project-ref "${{ secrets.SUPABASE_STAGING_PROJECT_REF }}" \
            --password "$SUPABASE_DB_PASSWORD" 2>&1 | tee supabase-link.log
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            message=$(tr '\n' ' ' < supabase-link.log)
            echo "::error title=Supabase link failed::$message"
            exit "$status"
          fi

      - name: Push migrations to staging
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_STAGING_DB_PASSWORD }}
        run: |
          set -o pipefail
          supabase db push 2>&1 | tee supabase-db-push.log
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            message=$(tr '\n' ' ' < supabase-db-push.log)
            echo "::error title=Supabase db push failed::$message"
            exit "$status"
          fi

      - name: Verify migration state
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_STAGING_DB_PASSWORD }}
        run: supabase migration list
